version: 2
updates:
  - package-ecosystem: npm
    schedule:
      interval: cron
      timezone: Europe/Berlin
      cronjob: '05 0 15 * *'
    open-pull-requests-limit: 15
    assignees:
      - ipod86
    versioning-strategy: increase
    directories:
      - '**/*'
    cooldown:
      default: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: cron
      timezone: Europe/Berlin
      cronjob: '05 0 15 * *'
    open-pull-requests-limit: 15
    assignees:
      - ipod86
